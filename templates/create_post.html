<!DOCTYPE html>
<html lang="en">
<head>
    <title>Notes by Alice</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Blog Template">
    <meta name="author" content="Xiaoying Riley at 3rd Wave Media">
    <link rel="shortcut icon" href="/static/favicon.ico">
	<script defer src="/static/assets/fontawesome/js/all.min.js"></script>
    <link id="theme-style" rel="stylesheet" href="/static/assets/css/theme-8.css">
</head>

<body>
<header class="header text-center">
	    <h1 class="blog-name pt-lg-4 mb-0"><a class="no-text-decoration" href="{{ url_for('get_all_posts') }}">Notes by Alice</a></h1>

	    <nav class="navbar navbar-expand-lg navbar-dark" >
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navigation" aria-controls="navigation" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>

			<div id="navigation" class="collapse navbar-collapse flex-column" >
				<div class="profile-section pt-3 pt-lg-0">
				    <img class="profile-image mb-3 rounded-circle mx-auto" src="/static/assets/images/profile.png" alt="image" >

					<div class="bio mb-3">
    					Hi 👋 I'm Alice Dias, I love enjoy building backend systems that make things simpler, smarter and more automated. I love learning, experimenting and sharing what I discover along the way.<br><a href="{{ url_for('about') }}">Find out more about me</a>
					</div><!--//bio-->
					<ul class="social-list list-inline py-3 mx-auto">
			            <li class="list-inline-item"><a href="https://www.linkedin.com/in/alice-moreira-dias"><i class="fab fa-linkedin-in fa-fw"></i></a></li>
			            <li class="list-inline-item"><a href="https://github.com/heyliceeee"><i class="fab fa-github fa-fw"></i></a></li>
			            <li class="list-inline-item"><a href="https://cv-alice-dias.vercel.app"><i class="fa fa-globe-europe fa-fw"></i></a></li>
			        </ul><!--//social-list-->
			        <hr>
				</div><!--//profile-section-->

				<ul class="navbar-nav flex-column text-start">
					<li class="nav-item">
					    <a class="nav-link" href="{{ url_for('get_all_posts') }}"><i class="fas fa-home fa-fw me-2"></i>Home</a>
					</li>
					<li class="nav-item">
					    <a class="nav-link active" href="{{ url_for('posts_crud') }}"><i class="fas fa-edit fa-fw me-2"></i>Manage Posts <span class="sr-only">(current)</span></a>
					</li>
				</ul>

				<div class="my-2 my-md-3">
				    <a class="btn btn-primary" href="{{ url_for('logout') }}">Logout</a>
				</div>
			</div>
		</nav>
    </header>

<div class="main-wrapper">
    <section class="cta-section theme-bg-light py-5">
        <div class="container single-col-max-width">
            <h2 class="heading text-center">Create New Post</h2>

            <form method="POST" class="mt-4">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Title</label>
                    <input type="text" name="title" class="form-control form-control-lg" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Subtitle</label>
                    <input type="text" name="subtitle" class="form-control form-control-lg" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Image URL</label>
                    <input type="text" name="image" class="form-control form-control-lg" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Body</label>
                    <textarea name="body" class="form-control form-control-lg" rows="6" required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Published Date</label>
                    <input type="text" name="published" class="form-control form-control-lg" placeholder="Jun 29, 2026" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Reading Time (minutes)</label>
                    <input type="number" name="reading_time" class="form-control form-control-lg" required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">
                    <i class="fas fa-save me-2"></i>Save Post
                </button>

                <a href="{{ url_for('posts_crud') }}" class="btn btn-secondary btn-lg w-100 mt-2">
                    Cancel
                </a>
            </form>
        </div>
    </section>
</div>
<script src="/static/assets/plugins/popper.min.js"></script>
<script src="/static/assets/plugins/bootstrap/js/bootstrap.min.js"></script>
</body>
</html>
